executable: ../third_party/llama.cpp/build-release/bin/llama-bench
model: ../models/qwen2.5-0.5b-instruct-q4_k_m.gguf
threads: [1, 2, 4, 8]
prompt_tokens: [32, 128, 512, 1024, 2048]
generated_tokens: [16, 64, 128]
batch_sizes: [512]
ubatch_sizes: [512]
context_sizes: [4096]
repetitions: 5
warmup_runs: 1
timeout_seconds: 900
output_directory: ../benchmarks/results/prefill_decode_scaling
mmap: true
cpu_only: true
explicit_cases:
  # Prompt-length scaling (p, n=64, t=4).
  - {threads: 4, prompt_tokens: 32, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 128, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 512, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 1024, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 2048, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  # Generation-length scaling (the n=64 overlap is intentionally repeated and deduplicated).
  - {threads: 4, prompt_tokens: 512, generated_tokens: 16, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 512, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 512, generated_tokens: 128, batch_size: 512, ubatch_size: 512, context_size: 4096}
  # Thread scaling (the t=4 overlaps are intentionally repeated and deduplicated).
  - {threads: 1, prompt_tokens: 128, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 2, prompt_tokens: 128, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 128, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 8, prompt_tokens: 128, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 1, prompt_tokens: 1024, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 2, prompt_tokens: 1024, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 4, prompt_tokens: 1024, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
  - {threads: 8, prompt_tokens: 1024, generated_tokens: 64, batch_size: 512, ubatch_size: 512, context_size: 4096}
