name: Python Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install requirements
        run: python -m pip install -r requirements.txt
      - name: Test
        run: python -m pytest
      - name: S6 workload and metric validation
        run: python -m pytest tests/python/test_serving_workloads.py tests/python/test_serving_metrics.py tests/python/test_serving_documentation.py
